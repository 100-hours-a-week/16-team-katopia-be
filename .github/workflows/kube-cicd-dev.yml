name: kube-cicd-dev - Spring

on:
  push:
    branches: ["dev"]

concurrency:
  group: kube-cicd-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 713502468901.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: katopia/kube/backend

jobs:
  ci:
    name: Build and Prepare Layers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache project .gradle
        uses: actions/cache@v4
        with:
          path: .gradle
          key: project-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', 'settings.gradle*') }}
          restore-keys: |
            project-gradle-${{ runner.os }}-

      - name: Override secrets manager path for kube build only
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's#^\([[:space:]]*import:[[:space:]]*optional:aws-secretsmanager:\).*#\1kube/secret/spring#' src/main/resources/application-dev.yml
          grep -n 'import:' src/main/resources/application-dev.yml

      - name: Build (gradle build)
        run: gradle --no-daemon --build-cache build -x test

      - name: Extract JAR layers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p jar-layers
          cd jar-layers
          java -Djarmode=layertools -jar $(ls ../build/libs/*.jar | grep -v plain) extract
          [ -d snapshot-dependencies ] || (mkdir -p snapshot-dependencies && touch snapshot-dependencies/.keep)

      - name: Upload JAR layers
        uses: actions/upload-artifact@v4
        with:
          name: jar-layers-kube-dev
          path: jar-layers/
          retention-days: 1

  build-and-push:
    name: Docker Build and Push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download JAR layers
        uses: actions/download-artifact@v4
        with:
          name: jar-layers-kube-dev
          path: jar-layers/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        shell: bash
        run: |
          set -euo pipefail
          TAG="dev-${GITHUB_SHA::7}"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"

          docker build \
            -t "$IMAGE_URI:$TAG" \
            -t "$IMAGE_URI:dev-backend" \
            .

          docker push "$IMAGE_URI:$TAG"
          docker push "$IMAGE_URI:dev-backend"
