deploy-ssm:
  name: CD - SSM Run deploy.sh
  runs-on: ubuntu-latest
  timeout-minutes: 30
  needs: build-and-push

  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Who am I?
      run: aws sts get-caller-identity

    - name: Run deploy.sh via SSM
      id: start_instance_deploy
      run: |
        set -euo pipefail
        echo "AWS_REGION=$AWS_REGION"
        echo "SSM_DEPLOY_TARGET=$SSM_DEPLOY_TARGET"
        
        CMD_ID="$(aws ssm send-command \
          --region "$AWS_REGION" \
          --document-name "AWS-RunShellScript" \
          --targets '[{"Key":"tag:DeployTarget","Values":["'"$SSM_DEPLOY_TARGET"'"]}]' \
          --comment "Deploy fitcheck Docker backend ${GITHUB_SHA::7}" \
          --parameters commands=["sudo","bash","-lc","$DEPLOY_SCRIPT"] \
          --query "Command.CommandId" \
          --output text)"
        
        echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
        echo "CommandId=$CMD_ID"

    - name: Fetch command result
      run: |
        set -euo pipefail
        IID="$(aws ec2 describe-instances \
          --region "$AWS_REGION" \
          --filters "Name=tag:DeployTarget,Values=$SSM_DEPLOY_TARGET" "Name=instance-state-name,Values=running" \
          --query "Reservations[0].Instances[0].InstanceId" \
          --output text)"
        echo "InstanceId=$IID"
        
        aws ssm wait command-executed \
          --region "$AWS_REGION" \
          --command-id "${{ steps.start_instance_deploy.outputs.command_id }}" \
          --instance-id "$IID"
        
        aws ssm get-command-invocation \
          --region "$AWS_REGION" \
          --command-id "${{ steps.start_instance_deploy.outputs.command_id }}" \
          --instance-id "$IID" \
          --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
          --output json